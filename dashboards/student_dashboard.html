<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GrowthBuddy</title>

    <!-- CSS -->
    <link rel="stylesheet" href="../static/css/base.css">
    <link rel="stylesheet" href="../static/css/components.css">
    <link rel="stylesheet" href="../static/css/dashboard.css">
</head>
<body>

    <!-- Navbar will load here -->
    <div id="navbar"></div>

    <div class="layout">

        <!-- Sidebar will load here -->
        <div id="sidebar"></div>

    <main class="dashboard">

    <!-- Welcome Section -->
    <section class="welcome">
        <h1>Welcome back, Sidrah 👋</h1>
        <p>Stay consistent and track your academic growth.</p>
    </section>

    <!-- Stats Cards -->
    <section class="cards">
        <div class="card">
            <h3>Total Assignments</h3>
            <p>12</p>
        </div>
        <div class="card">
            <h3>Completed</h3>
            <p>8</p>
        </div>
        <div class="card">
            <h3>Pending</h3>
            <p>4</p>
        </div>
        <div class="card">
            <h3>Streak</h3>
            <p>5 Days</p>
        </div>
    </section>

    <!-- Main Content Grid -->
    <section class="main-content">

        <!-- Upcoming Tasks -->
        <div class="tasks">
            <h2>Upcoming Tasks</h2>
            <ul>
                <li>📌 DSA Assignment - Tomorrow</li>
                <li>📌 Python Practical - 2 Days</li>
                <li>📌 Mini Project - 5 Days</li>
            </ul>
        </div>

        <!-- Skill Progress -->
        <div class="skills">
            <h2>Your Skills</h2>

            <div class="skill">
                <p>HTML</p>
                <div class="progress-bar">
                    <div style="width: 80%;"></div>
                </div>
            </div>

            <div class="skill">
                <p>CSS</p>
                <div class="progress-bar">
                    <div style="width: 60%;"></div>
                </div>
            </div>

            <div class="skill">
                <p>JavaScript</p>
                <div class="progress-bar">
                    <div style="width: 40%;"></div>
                </div>
            </div>

        </div>

    </section>

</main>
    </div>

    <!-- Footer will load here -->
    <div id="footer"></div>

    <!-- JS -->
   <script src="../js/dashboard.js"></script>

</body>
</html>
