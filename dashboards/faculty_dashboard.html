<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GrowthBuddy</title>

    <!-- CSS -->
    <link rel="stylesheet" href="../static/css/base.css">
    <link rel="stylesheet" href="../static/css/components.css">
    <link rel="stylesheet" href="../static/css/dashboard.css">
</head>
<body>

    <!-- Navbar will load here -->
    <div id="navbar"></div>

    <div class="layout">

        <!-- Sidebar will load here -->
        <div id="sidebar"></div>

        <!-- Main Content -->
       <main class="dashboard">

    <!-- Welcome -->
    <section class="welcome">
        <h1>Welcome, Faculty 👋</h1>
        <p>Manage students and track academic progress.</p>
    </section>

    <!-- Stats -->
    <section class="cards">
        <div class="card">
            <h3>Total Students</h3>
            <p>120</p>
        </div>
        <div class="card">
            <h3>Assignments Created</h3>
            <p>25</p>
        </div>
        <div class="card">
            <h3>Pending Reviews</h3>
            <p>10</p>
        </div>
        <div class="card">
            <h3>Classes</h3>
            <p>6</p>
        </div>
    </section>

    <!-- Main Content -->
    <section class="main-content">

        <!-- Assignment Management -->
        <div class="tasks">
            <h2>Recent Assignments</h2>
            <ul>
                <li>DBMS Assignment - Submitted by 50 students</li>
                <li>Python Lab - Pending review</li>
                <li>Mini Project - Deadline in 3 days</li>
            </ul>
        </div>

        <!-- Quick Actions -->
        <div class="skills">
            <h2>Quick Actions</h2>

            <button class="action-btn">Create Assignment</button>
            <button class="action-btn">View Submissions</button>
            <button class="action-btn">Manage Students</button>

        </div>

    </section>

</main>
    </div>

    <!-- Footer will load here -->
    <div id="footer"></div>

    <!-- JS -->
    <script src="../js/dashboard.js"></script>

</body>
</html>
