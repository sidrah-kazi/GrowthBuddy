<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GrowthBuddy</title>

    <!-- CSS -->
    <link rel="stylesheet" href="../static/css/base.css">
    <link rel="stylesheet" href="../static/css/components.css">
    <link rel="stylesheet" href="../static/css/dashboard.css">

</head>
<body>

    <!-- Navbar will load here -->
    <div id="navbar"></div>

    <div class="layout">

        <!-- Sidebar will load here -->
        <div id="sidebar"></div>

<main class="dashboard">

    <!-- Heading -->
    <section class="welcome">
   <h1>Welcome</h1>  
    </section>

    <main class="dashboard">
<h2>Faculty Assignment Board</h2>

<!-- 🔹 Add Assignment -->
<div class="card">
    <h3>Add Assignment</h3>

    <select id="division" onchange="updateSubjects()">
        <option value="">Select Division</option>
        <option value="SE-A">SE-A</option>
        <option value="SE-B">SE-B</option>
        <option value="TE-A">TE-A</option>
    </select>

    <select id="subject">
        <option value="">Select Subject</option>
        <option value="DBMS">DBMS</option>
        <option value="OS">OS</option>
        <option value="FTS">FTS</option>
    </select>

    <input type="text" id="title" placeholder="Assignment Title">
    <input type="date" id="dueDate">

    <button onclick="addAssignment()">Add Assignment</button>
</div>

<div class="card">
    <h3>All Assignments</h3>
    <table>
        <thead>
            <tr>
                <th>Division</th>
                <th>Subject</th>
                <th>Title</th>
                <th>Due Date</th>
                <th>Submissions</th>
            </tr>
        </thead>
        <tbody id="assignmentTable"></tbody>
    </table>
</div>

<div class="card" id="submissionSection" style="display:none;">
    <h3>Student Submissions</h3>
    <table>
        <thead>
            <tr>
                <th>Student</th>
                <th>File</th>
                <th>Status</th>
                <th>Marks</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="submissionTable"></tbody>
    </table>
</div>

<div id="submissionSection" style="display:none;"> 
    <h3>Student Submissions</h3>

    <table>
        <thead>
            <tr>
                <th>Student</th>
                <th>File</th>
                <th>Status</th>
                <th>Marks</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="submissionTable"></tbody>
    </table>
</div>

    </section>

</main></div> <!-- Footer will load here -->
    <div id="footer"></div>

    <!-- JS -->
    <script src="../js/dashboard.js"></script>
     <script src="../js/main.js"></script>

</body>
</html>
