    <!-- Navbar will load here -->

<main class="dashboard">

    <!-- Heading -->
    <section class="welcome">
        <h1>📚 My Assignments</h1>
        <p>Submit your work and track your progress</p>
    </section>

    <table>
        <thead>
            <tr>
                <th>Assignment</th>
                <th>Subject</th>
                <th>Due Date</th>
                <th>Status</th>
                <th>Upload</th>
                <th>Submit</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>HW 1</td>
                <td>DSA</td>
                <td>2 April</td>

                <td><button>Submit</button></td>
            </tr>

            <tr>
                <td>Mini Project</td>
                <td>DBMS</td>
                <td>5 April</td>
                <td class="status-pending">Pending</td>
                <td><input type="file"></td>
                <td><button>Submit</button></td>
            </tr>

            <tr>
                <td>Lab Report</td>
                <td>Python</td>
                <td>1 April</td>
                <td class="status-submitted">Submitted</td>
                <td><input type="file"></td>
                <td><button>Re-submit</button></td>
            </tr>
        </tbody>
    </table>
<h2 class="analysis-title">Marks Analysis</h2>

<div class="analysis-container">

    <div class="card">
        <h3>Total</h3>
        <p>240</p>
    </div>

    <div class="card">
        <h3>Average</h3>
        <p>80</p>
    </div>

    <div class="card">
        <h3>Highest</h3>
        <p>95</p>
    </div>

    <div class="card">
        <h3>Lowest</h3>
        <p>65</p>
    </div>

</div>
